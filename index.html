<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE 1st Year Roadmap — Your Journey Begins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void: #07090F; --surface-0: #0D1117; --surface-1: #111827;
    --surface-2: #1A2332; --surface-3: #1E293B; --border: #243040;
    --mint: #6EE7B7; --mint-dim: rgba(110,231,183,0.12);
    --indigo: #818CF8; --indigo-dim: rgba(129,140,248,0.12);
    --amber: #F59E0B; --amber-dim: rgba(245,158,11,0.12);
    --rose: #F87171; --rose-dim: rgba(248,113,113,0.10);
    --sky: #38BDF8; --sky-dim: rgba(56,189,248,0.10);
    --violet: #A78BFA; --violet-dim: rgba(167,139,250,0.10);
    --text-1: #F1F5F9; --text-2: #94A3B8; --text-3: #64748B;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--void); color: var(--text-1); min-height: 100vh; overflow-x: hidden; }

  /* ── PROGRESS BAR ── */
  #progress-bar-wrap {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    background: rgba(7,9,15,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 14px;
  }
  #progress-bar-wrap .logo { font-family: var(--font-mono); font-size: 12px; color: var(--mint); white-space: nowrap; letter-spacing: 0.05em; }
  #progress-track { flex: 1; height: 6px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--mint), var(--indigo)); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 10px var(--mint); }
  #progress-pct { font-family: var(--font-mono); font-size: 12px; color: var(--mint); min-width: 42px; text-align: right; }
  #progress-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); white-space: nowrap; }

  /* ── HERO ── */
  .hero { padding: 120px 24px 60px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 700px; height: 700px; background: radial-gradient(circle, rgba(110,231,183,0.06) 0%, transparent 70%); pointer-events: none; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mint); background: var(--mint-dim); border: 1px solid rgba(110,231,183,0.2); padding: 6px 14px; border-radius: 999px; margin-bottom: 24px; }
  .hero-eyebrow::before { content: ''; width: 6px; height: 6px; background: var(--mint); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.8);} }
  .hero h1 { font-family: var(--font-display); font-size: clamp(2rem,5vw,3.6rem); font-weight: 700; line-height: 1.1; margin-bottom: 16px; letter-spacing: -0.02em; }
  .hero h1 span.accent { color: var(--mint); }
  .hero h1 span.accent-2 { color: var(--indigo); }
  .hero-sub { font-size: 1rem; color: var(--text-2); max-width: 560px; margin: 0 auto 40px; line-height: 1.7; }
  .hero-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num { font-family: var(--font-mono); font-size: 2rem; font-weight: 600; color: var(--text-1); line-height: 1; }
  .stat-num .unit { font-size: 1rem; color: var(--mint); }
  .stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

  /* ── LAYOUT ── */
  .container { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }
  .phase { margin-bottom: 56px; position: relative; }

  /* ── PHASE HEADER ── */
  .phase-header {
    display: flex; align-items: flex-start; gap: 16px; margin-bottom: 0;
    padding: 24px; background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 16px 16px 0 0; position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .phase-header.no-suggestions { border-radius: 16px; margin-bottom: 20px; }
  .phase-header::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 4px 0 0 4px; }
  .phase-header.color-mint::before   { background: var(--mint); }
  .phase-header.color-indigo::before { background: var(--indigo); }
  .phase-header.color-amber::before  { background: var(--amber); }
  .phase-header.color-rose::before   { background: var(--rose); }
  .phase-header.color-sky::before    { background: var(--sky); }
  .phase-header.color-violet::before { background: var(--violet); }
  .phase-header.color-mint2::before  { background: var(--mint); }
  .phase-header.color-amber2::before { background: var(--amber); }

  .phase-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .color-mint .phase-icon   { background: var(--mint-dim); }
  .color-indigo .phase-icon { background: var(--indigo-dim); }
  .color-amber .phase-icon  { background: var(--amber-dim); }
  .color-rose .phase-icon   { background: var(--rose-dim); }
  .color-sky .phase-icon    { background: var(--sky-dim); }
  .color-violet .phase-icon { background: var(--violet-dim); }
  .color-mint2 .phase-icon  { background: var(--mint-dim); }
  .color-amber2 .phase-icon { background: var(--amber-dim); }

  .phase-meta { flex: 1; }
  .phase-step { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
  .phase-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
  .phase-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .phase-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .badge { font-family: var(--font-mono); font-size: 10px; padding: 3px 10px; border-radius: 999px; border: 1px solid; }
  .badge-time { border-color: rgba(110,231,183,0.3); color: var(--mint); }
  .badge-goal { border-color: rgba(129,140,248,0.3); color: var(--indigo); }

  .phase-progress { display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; flex-direction: column; }
  .phase-pct { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--text-1); }
  .mini-track { width: 80px; height: 4px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
  .mini-fill { height: 100%; width: 0%; border-radius: 999px; transition: width 0.4s ease; }
  .color-mint .mini-fill   { background: var(--mint); }
  .color-indigo .mini-fill { background: var(--indigo); }
  .color-amber .mini-fill  { background: var(--amber); }
  .color-rose .mini-fill   { background: var(--rose); }
  .color-sky .mini-fill    { background: var(--sky); }
  .color-violet .mini-fill { background: var(--violet); }
  .color-mint2 .mini-fill  { background: var(--mint); }
  .color-amber2 .mini-fill { background: var(--amber); }

  /* ── SUGGESTIONS PANEL ── */
  .suggestions-wrap {
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-radius: 0 0 0 0;
    overflow: hidden;
    margin-bottom: 0;
  }

  .suggestions-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 24px;
    background: rgba(245,158,11,0.05);
    border-top: 1px dashed rgba(245,158,11,0.2);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .suggestions-toggle:hover { background: rgba(245,158,11,0.09); }
  .suggestions-toggle .sg-icon { font-size: 14px; }
  .suggestions-toggle .sg-label { font-family: var(--font-mono); font-size: 11px; color: var(--amber); letter-spacing: 0.08em; flex: 1; }
  .suggestions-toggle .sg-arrow { font-size: 10px; color: var(--text-3); transition: transform 0.2s; }
  .suggestions-toggle.open .sg-arrow { transform: rotate(180deg); }

  .suggestions-body {
    display: none;
    padding: 20px 24px 24px;
    background: rgba(245,158,11,0.03);
    border-top: 1px solid rgba(245,158,11,0.1);
    gap: 20px;
    flex-direction: column;
  }
  .suggestions-body.open { display: flex; }

  /* suggestion section title */
  .sg-section-title {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
  }

  /* tip cards grid */
  .sg-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

  .sg-card {
    padding: 14px 16px; border-radius: 10px;
    border: 1px solid; font-size: 13px; line-height: 1.55;
  }
  .sg-card.do   { background: rgba(110,231,183,0.05); border-color: rgba(110,231,183,0.18); }
  .sg-card.dont { background: rgba(248,113,113,0.05); border-color: rgba(248,113,113,0.18); }
  .sg-card.tip  { background: rgba(129,140,248,0.05); border-color: rgba(129,140,248,0.18); }
  .sg-card.res  { background: rgba(56,189,248,0.05);  border-color: rgba(56,189,248,0.18); }
  .sg-card.warn { background: rgba(245,158,11,0.06);  border-color: rgba(245,158,11,0.18); }

  .sg-card-tag {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
  }
  .sg-card.do   .sg-card-tag { color: var(--mint); }
  .sg-card.dont .sg-card-tag { color: var(--rose); }
  .sg-card.tip  .sg-card-tag { color: var(--indigo); }
  .sg-card.res  .sg-card-tag { color: var(--sky); }
  .sg-card.warn .sg-card-tag { color: var(--amber); }
  .sg-card-body { color: var(--text-2); }

  /* resource links list */
  .sg-links { display: flex; flex-direction: column; gap: 6px; }
  .sg-link {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 13px; color: var(--sky); cursor: default;
    text-decoration: none;
  }
  .sg-link:hover { background: var(--surface-3); }
  .sg-link-icon { font-size: 14px; flex-shrink: 0; }
  .sg-link-label { flex: 1; }
  .sg-link-sub { font-size: 11px; color: var(--text-3); }

  /* motivational quote */
  .sg-quote {
    padding: 16px 20px;
    border-left: 3px solid var(--amber);
    background: rgba(245,158,11,0.06);
    border-radius: 0 10px 10px 0;
    font-size: 14px; color: var(--text-2); line-height: 1.6; font-style: italic;
  }
  .sg-quote cite { display: block; margin-top: 8px; font-style: normal; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }

  /* milestone box */
  .sg-milestone {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 13px;
  }
  .sg-milestone-icon { font-size: 22px; flex-shrink: 0; }
  .sg-milestone-text { color: var(--text-2); line-height: 1.5; }
  .sg-milestone-text strong { color: var(--mint); font-weight: 600; }

  /* topics below suggestions */
  .topics-section { margin-top: 14px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); border-radius: 0 0 16px 16px; overflow: hidden; }
  .topics-section-inner { padding: 14px; background: var(--void); display: flex; flex-direction: column; gap: 10px; }

  /* ── TOPIC CARDS ── */
  .topic-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .topic-card:hover { border-color: var(--surface-3); }
  .topic-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; }
  .topic-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .topic-check.checked { background: var(--mint); border-color: var(--mint); }
  .topic-check.checked::after { content: '✓'; font-size: 11px; color: #000; font-weight: 700; }
  .topic-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text-1); transition: color 0.2s; }
  .topic-name.done { color: var(--text-3); text-decoration: line-through; }
  .topic-toggle { font-size: 11px; color: var(--text-3); transition: transform 0.2s; margin-left: auto; flex-shrink: 0; }
  .topic-toggle.open { transform: rotate(180deg); }

  .subtasks { padding: 0 18px 16px 50px; display: none; flex-direction: column; gap: 6px; }
  .subtasks.open { display: flex; }
  .subtask-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: 8px; background: var(--surface-2); cursor: pointer; transition: background 0.15s; }
  .subtask-item:hover { background: var(--surface-3); }
  .sub-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.2s; }
  .sub-check.checked { background: var(--mint); border-color: var(--mint); }
  .sub-check.checked::after { content: '✓'; font-size: 9px; color: #000; font-weight: 700; }
  .sub-label { font-size: 13px; color: var(--text-2); line-height: 1.4; }
  .sub-label.done { text-decoration: line-through; color: var(--text-3); }

  .sub-sub-list { display: none; flex-direction: column; gap: 4px; margin-top: 6px; padding-left: 26px; }
  .sub-sub-list.open { display: flex; }
  .sub-sub-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.02); cursor: pointer; transition: background 0.15s; }
  .sub-sub-item:hover { background: rgba(255,255,255,0.04); }
  .sub-sub-check { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 0.2s; }
  .sub-sub-check.checked { background: var(--indigo); border-color: var(--indigo); }
  .sub-sub-check.checked::after { content: '✓'; font-size: 8px; color: #fff; font-weight: 700; }
  .sub-sub-label { font-size: 12px; color: var(--text-3); line-height: 1.4; }
  .sub-sub-label.done { text-decoration: line-through; color: var(--surface-3); }

  /* timeline divider */
  .timeline-divider { display: flex; align-items: center; gap: 12px; margin: 32px 0 20px; }
  .tl-month { font-family: var(--font-mono); font-size: 11px; color: var(--amber); background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.2); padding: 4px 12px; border-radius: 999px; white-space: nowrap; }
  .tl-line { flex: 1; height: 1px; background: var(--border); }

  /* daily routine */
  .routine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
  .routine-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
  .routine-time { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 600; color: var(--mint); }
  .routine-unit { font-size: 12px; color: var(--text-3); }
  .routine-label { font-size: 13px; color: var(--text-2); margin-top: 6px; }

  /* actions */
  .actions-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
  .btn { font-family: var(--font-mono); font-size: 12px; padding: 10px 20px; border-radius: 8px; border: 1px solid; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--text-2); }
  .btn-ghost:hover { background: var(--surface-1); color: var(--text-1); }
  .btn-danger { background: transparent; border-color: rgba(248,113,113,0.3); color: var(--rose); }
  .btn-danger:hover { background: var(--rose-dim); }

  /* toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface-2); border: 1px solid var(--mint); color: var(--mint); font-family: var(--font-mono); font-size: 12px; padding: 12px 20px; border-radius: 10px; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 99999; box-shadow: 0 0 20px rgba(110,231,183,0.15); }
  #toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

  @media (max-width: 600px) {
    .hero { padding-top: 90px; }
    .hero-stats { gap: 24px; }
    .phase-header { flex-wrap: wrap; }
    .phase-progress { flex-direction: row; align-items: center; }
    .sg-cards { grid-template-columns: 1fr; }
    .subtasks { padding-left: 26px; }
  }
</style>
</head>
<body>

<div id="progress-bar-wrap">
  <span class="logo">CSE_ROADMAP</span>
  <div id="progress-track"><div id="progress-fill"></div></div>
  <span id="progress-pct">0%</span>
  <span id="progress-count">0/0</span>
</div>

<div class="hero">
  <div class="hero-eyebrow">1st Year · CSE Batch · 12-Month Journey</div>
  <h1>Build Your <span class="accent">Foundation.</span><br>Own Your <span class="accent-2">Future.</span></h1>
  <p class="hero-sub">শুধু CGPA নয় — Skill-ই তোমার Career-এর সবচেয়ে বড় শক্তি। প্রতিটি চেকবক্স তোমার progress-এর একটি প্রমাণ।</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><span id="s-phases">8</span></div><div class="stat-label">Phases</div></div>
    <div class="stat"><div class="stat-num"><span id="s-total">—</span></div><div class="stat-label">Total Tasks</div></div>
    <div class="stat"><div class="stat-num"><span id="s-done">0</span></div><div class="stat-label">Completed</div></div>
    <div class="stat"><div class="stat-num"><span id="s-months">12</span><span class="unit">mo</span></div><div class="stat-label">Timeline</div></div>
  </div>
</div>

<div class="actions-bar">
  <button class="btn btn-ghost" onclick="expandAll()">▼ Expand All</button>
  <button class="btn btn-ghost" onclick="collapseAll()">▲ Collapse All</button>
  <button class="btn btn-danger" onclick="resetAll()">↺ Reset Progress</button>
</div>

<div class="container" id="roadmap-root"></div>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────
// SUGGESTIONS DATA — one object per phase
// ─────────────────────────────────────────────────────────
const SUGGESTIONS = {
  p1: {
    quote: { text: "The computer was born to solve problems that did not exist before.", cite: "— Bill Gates" },
    cards: [
      { type:'do',   title:'✅ DO',   body:'প্রতিদিন Linux terminal-এ কমপক্ষে ৫টি নতুন command practice করো। Muscle memory তৈরি হবে।' },
      { type:'do',   title:'✅ DO',   body:'VS Code-এ প্রথম দিনেই "Hello World" run করো। ছোট success তোমার confidence বাড়াবে।' },
      { type:'dont', title:'🚫 DON\'T', body:'Hardware theory মুখস্থ করার দরকার নেই। YouTube-এ teardown video দেখো — visually শেখো।' },
      { type:'dont', title:'🚫 DON\'T', body:'MS Office শুধু টাইপিং মনে করো না। Template বানাও, shortcut শেখো — efficiency বাড়ে।' },
      { type:'warn', title:'⚠️ COMMON MISTAKE', body:'অনেকেই Linux skip করে। কিন্তু CSE-তে Server, Cybersecurity, ML সব Linux-based। এখনই শুরু করো।' },
      { type:'tip',  title:'💡 PRO TIP', body:'Typing speed কম হলে প্রতিদিন ১৫ মিনিট keybr.com-এ practice করো। ৩০ দিনে ৪০ WPM সম্ভব।' },
    ],
    resources: [
      { icon:'▶️', label:'CS50x — Harvard (Free)', sub:'YouTube / edx.org — Best intro to CS', url:'#' },
      { icon:'▶️', label:'Linux for Beginners', sub:'NetworkChuck on YouTube — Bangla subtitle আছে', url:'#' },
      { icon:'📖', label:'keybr.com', sub:'Typing speed practice — Free', url:'#' },

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('cse_roadmap_v4') || '{}');
function saveState() { localStorage.setItem('cse_roadmap_v4', JSON.stringify(state)); }
function isChecked(id) { return !!state[id]; }
function toggleCheck(id) { state[id] = !state[id]; saveState(); updateUI(); }

// ─────────────────────────────────────────────────────────
// RENDER SUGGESTIONS
// ─────────────────────────────────────────────────────────
function renderSuggestions(phaseId) {
  const sg = SUGGESTIONS[phaseId];
  if (!sg) return null;

  const wrap = document.createElement('div');
  wrap.className = 'suggestions-wrap';

  const toggle = document.createElement('div');
  toggle.className = `suggestions-toggle ${state['sg_open_'+phaseId] ? 'open' : ''}`;
  toggle.innerHTML = `<span class="sg-icon">💡</span><span class="sg-label">Mentor Suggestions & Resources</span><span class="sg-arrow">▼</span>`;
  toggle.onclick = () => {
    state['sg_open_'+phaseId] = !state['sg_open_'+phaseId];
    saveState();
    toggle.classList.toggle('open', !!state['sg_open_'+phaseId]);
    body.classList.toggle('open', !!state['sg_open_'+phaseId]);
  };

  const body = document.createElement('div');
  body.className = `suggestions-body ${state['sg_open_'+phaseId] ? 'open' : ''}`;

  // Quote
  if (sg.quote) {
    const q = document.createElement('blockquote');
    q.className = 'sg-quote';
    q.innerHTML = `"${sg.quote.text}"<cite>${sg.quote.cite}</cite>`;
    body.appendChild(q);
  }

  // Cards
  if (sg.cards && sg.cards.length) {
    const secTitle = document.createElement('div');
    secTitle.className = 'sg-section-title';
    secTitle.textContent = 'Tips, Warnings & Best Practices';
    body.appendChild(secTitle);

    const grid = document.createElement('div');
    grid.className = 'sg-cards';
    sg.cards.forEach(c => {
      const card = document.createElement('div');
      card.className = `sg-card ${c.type}`;
      card.innerHTML = `<div class="sg-card-tag">${c.title}</div><div class="sg-card-body">${c.body}</div>`;
      grid.appendChild(card);
    });
    body.appendChild(grid);
  }

  // Resources
  if (sg.resources && sg.resources.length) {
    const secTitle2 = document.createElement('div');
    secTitle2.className = 'sg-section-title';
    secTitle2.textContent = 'Recommended Resources';
    body.appendChild(secTitle2);

    const links = document.createElement('div');
    links.className = 'sg-links';
    sg.resources.forEach(r => {
      const link = document.createElement('div');
      link.className = 'sg-link';
      link.innerHTML = `<span class="sg-link-icon">${r.icon}</span><div><div class="sg-link-label">${r.label}</div><div class="sg-link-sub">${r.sub}</div></div>`;
      links.appendChild(link);
    });
    body.appendChild(links);
  }

  // Milestone
  if (sg.milestone) {
    const secTitle3 = document.createElement('div');
    secTitle3.className = 'sg-section-title';
    secTitle3.textContent = 'Phase Milestone 🏆';
    body.appendChild(secTitle3);

    const ms = document.createElement('div');
    ms.className = 'sg-milestone';
    ms.innerHTML = `<span class="sg-milestone-icon">${sg.milestone.icon}</span><div class="sg-milestone-text">${sg.milestone.text}</div>`;
    body.appendChild(ms);
  }

  wrap.appendChild(toggle);
  wrap.appendChild(body);
  return wrap;
}

// ─────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('roadmap-root');
  root.innerHTML = '';

  ROADMAP.forEach((phase, pi) => {
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    phaseEl.id = phase.id;

    // Timeline divider
    const div = document.createElement('div');
    div.className = 'timeline-divider';
    div.innerHTML = `<span class="tl-month">📅 ${phase.timeline}</span><div class="tl-line"></div>`;
    phaseEl.appendChild(div);

    // Phase header
    const { done: pDone, total: pTotal } = phaseStats(phase);
    const pPct = pTotal ? Math.round(pDone / pTotal * 100) : 0;

    const header = document.createElement('div');
    header.className = `phase-header ${phase.color}`;
    header.innerHTML = `
      <div class="phase-icon">${phase.icon}</div>
      <div class="phase-meta">
        <div class="phase-step">${phase.step}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-desc">${phase.desc}</div>
        <div class="phase-badges">
          <span class="badge badge-time">⏱ ${phase.time}</span>
          <span class="badge badge-goal">🎯 ${phase.goal}</span>
        </div>
      </div>
      <div class="phase-progress">
        <div class="phase-pct" id="pct-${phase.id}">${pPct}%</div>
        <div class="mini-track"><div class="mini-fill" id="fill-${phase.id}" style="width:${pPct}%"></div></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-3)" id="count-${phase.id}">${pDone}/${pTotal}</div>
      </div>
    `;
    phaseEl.appendChild(header);

    // Suggestions panel
    const sgPanel = renderSuggestions(phase.id);
    if (sgPanel) phaseEl.appendChild(sgPanel);

    // Topics section
    const topicsSection = document.createElement('div');
    topicsSection.className = 'topics-section';
    const topicsInner = document.createElement('div');
    topicsInner.className = 'topics-section-inner';

    phase.topics.forEach(topic => {
      const { done: tDone, total: tTotal } = topicStats(topic);
      const isTopicDone = tDone === tTotal && tTotal > 0;

      const card = document.createElement('div');
      card.className = 'topic-card';

      const th = document.createElement('div');
      th.className = 'topic-header';

      const chk = document.createElement('div');
      chk.className = `topic-check ${isTopicDone ? 'checked' : ''}`;
      chk.id = `topchk-${topic.id}`;
      chk.onclick = (e) => { e.stopPropagation(); toggleAllSubs(topic); };

      const nm = document.createElement('span');
      nm.className = `topic-name ${isTopicDone ? 'done' : ''}`;
      nm.id = `topnm-${topic.id}`;
      nm.textContent = topic.name;

      const cnt = document.createElement('span');
      cnt.style.cssText = 'font-family:var(--font-mono);font-size:10px;color:var(--text-3);margin-left:8px;flex-shrink:0';
      cnt.id = `topcnt-${topic.id}`;
      cnt.textContent = `${tDone}/${tTotal}`;

      const tog = document.createElement('span');
      tog.className = `topic-toggle ${state['open_'+topic.id] ? 'open' : ''}`;
      tog.textContent = '▼';

      th.appendChild(chk); th.appendChild(nm); th.appendChild(cnt); th.appendChild(tog);

      th.addEventListener('click', () => {
        state['open_'+topic.id] = !state['open_'+topic.id];
        saveState();
        tog.classList.toggle('open', !!state['open_'+topic.id]);
        subList.classList.toggle('open', !!state['open_'+topic.id]);
      });

      card.appendChild(th);

      const subList = document.createElement('div');
      subList.className = `subtasks ${state['open_'+topic.id] ? 'open' : ''}`;

      topic.subs.forEach(sub => {
        const subItem = document.createElement('div');
        subItem.style.cssText = 'display:flex;flex-direction:column;gap:4px;';

        const subRow = document.createElement('div');
        subRow.className = 'subtask-item';

        const subChk = document.createElement('div');
        subChk.className = `sub-check ${isChecked(sub.id) ? 'checked' : ''}`;
        subChk.id = `subchk-${sub.id}`;

        const subLbl = document.createElement('span');
        subLbl.className = `sub-label ${isChecked(sub.id) ? 'done' : ''}`;
        subLbl.id = `sublbl-${sub.id}`;
        subLbl.textContent = sub.name;

        if (sub.subs && sub.subs.length > 0) {
          const subToggle = document.createElement('span');
          subToggle.style.cssText = 'font-size:10px;color:var(--text-3);margin-left:auto;flex-shrink:0;';
          const ssKey = 'open_ss_'+sub.id;
          subToggle.textContent = state[ssKey] ? '▾' : '▸';

          subRow.appendChild(subChk); subRow.appendChild(subLbl); subRow.appendChild(subToggle);

          subChk.onclick = (e) => { e.stopPropagation(); toggleCheck(sub.id); };
          subRow.addEventListener('click', (e) => {
            if (e.target === subChk) return;
            state[ssKey] = !state[ssKey]; saveState();
            subToggle.textContent = state[ssKey] ? '▾' : '▸';
            ssList.classList.toggle('open', !!state[ssKey]);
          });

          const ssList = document.createElement('div');
          ssList.className = `sub-sub-list ${state[ssKey] ? 'open' : ''}`;

          sub.subs.forEach(ss => {
            const ssItem = document.createElement('div');
            ssItem.className = 'sub-sub-item';
            ssItem.onclick = () => { toggleCheck(ss.id); };
            const ssChk = document.createElement('div');
            ssChk.className = `sub-sub-check ${isChecked(ss.id) ? 'checked' : ''}`;
            ssChk.id = `sschk-${ss.id}`;
            const ssLbl = document.createElement('span');
            ssLbl.className = `sub-sub-label ${isChecked(ss.id) ? 'done' : ''}`;
            ssLbl.id = `sslbl-${ss.id}`;
            ssLbl.textContent = ss.name;
            ssItem.appendChild(ssChk); ssItem.appendChild(ssLbl);
            ssList.appendChild(ssItem);
          });
          subItem.appendChild(subRow); subItem.appendChild(ssList);
        } else {
          subRow.onclick = () => { toggleCheck(sub.id); };
          subRow.appendChild(subChk); subRow.appendChild(subLbl);
          subItem.appendChild(subRow);
        }
        subList.appendChild(subItem);
      });

      card.appendChild(subList);
      topicsInner.appendChild(card);
    });

    topicsSection.appendChild(topicsInner);
    phaseEl.appendChild(topicsSection);
    root.appendChild(phaseEl);
  });

  // Daily routine
  const routineSection = document.createElement('div');
  routineSection.style.cssText = 'margin-top:48px;padding:24px;background:var(--surface-1);border:1px solid var(--border);border-radius:16px;';
  routineSection.innerHTML = `
    <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:600;margin-bottom:6px;">📅 Suggested Daily Routine</div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:16px;">প্রতিদিন মাত্র ৪ ঘণ্টা নিয়মিত দিলেই এক বছরে বিশাল পরিবর্তন আসবে।</div>
    <div class="routine-grid">
      <div class="routine-card"><div class="routine-time">1<span class="routine-unit">hr</span></div><div class="routine-label">Theory Learning</div></div>
      <div class="routine-card"><div class="routine-time">2<span class="routine-unit">hr</span></div><div class="routine-label">Coding Practice</div></div>
      <div class="routine-card"><div class="routine-time">1<span class="routine-unit">hr</span></div><div class="routine-label">Problem Solving</div></div>
      <div class="routine-card"><div class="routine-time">30<span class="routine-unit">min</span></div><div class="routine-label">GitHub / Project Update</div></div>
    </div>
  `;
  root.appendChild(routineSection);
  updateUI();
}

// ─────────────────────────────────────────────────────────
// STATS & UPDATE
// ─────────────────────────────────────────────────────────
function allLeafIds(phase) {
  const ids = [];
  phase.topics.forEach(t => { t.subs.forEach(s => { ids.push(s.id); if (s.subs) s.subs.forEach(ss => ids.push(ss.id)); }); });
  return ids;
}
function phaseStats(phase) { const ids = allLeafIds(phase); return { done: ids.filter(id => isChecked(id)).length, total: ids.length }; }
function topicStats(topic) {
  const ids = [];
  topic.subs.forEach(s => { ids.push(s.id); if (s.subs) s.subs.forEach(ss => ids.push(ss.id)); });
  return { done: ids.filter(id => isChecked(id)).length, total: ids.length };
}

function updateUI() {
  let totalDone = 0, totalAll = 0;
  ROADMAP.forEach(phase => {
    const { done, total } = phaseStats(phase);
    totalDone += done; totalAll += total;
    const pct = total ? Math.round(done / total * 100) : 0;
    const pctEl = document.getElementById('pct-'+phase.id);
    const fillEl = document.getElementById('fill-'+phase.id);
    const cntEl = document.getElementById('count-'+phase.id);
    if (pctEl) pctEl.textContent = pct + '%';
    if (fillEl) fillEl.style.width = pct + '%';
    if (cntEl) cntEl.textContent = `${done}/${total}`;

    phase.topics.forEach(topic => {
      const { done: td, total: tt } = topicStats(topic);
      const isTopicDone = td === tt && tt > 0;
      const chk = document.getElementById('topchk-'+topic.id);
      const nm = document.getElementById('topnm-'+topic.id);
      const cnt = document.getElementById('topcnt-'+topic.id);
      if (chk) chk.className = `topic-check ${isTopicDone ? 'checked' : ''}`;
      if (nm) nm.className = `topic-name ${isTopicDone ? 'done' : ''}`;
      if (cnt) cnt.textContent = `${td}/${tt}`;
      topic.subs.forEach(sub => {
        const sc = document.getElementById('subchk-'+sub.id);
        const sl = document.getElementById('sublbl-'+sub.id);
        if (sc) sc.className = `sub-check ${isChecked(sub.id) ? 'checked' : ''}`;
        if (sl) sl.className = `sub-label ${isChecked(sub.id) ? 'done' : ''}`;
        if (sub.subs) sub.subs.forEach(ss => {
          const sc2 = document.getElementById('sschk-'+ss.id);
          const sl2 = document.getElementById('sslbl-'+ss.id);
          if (sc2) sc2.className = `sub-sub-check ${isChecked(ss.id) ? 'checked' : ''}`;
          if (sl2) sl2.className = `sub-sub-label ${isChecked(ss.id) ? 'done' : ''}`;
        });
      });
    });
  });
  const pct = totalAll ? Math.round(totalDone / totalAll * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-count').textContent = `${totalDone}/${totalAll}`;
  document.getElementById('s-total').textContent = totalAll;
  document.getElementById('s-done').textContent = totalDone;
}

function toggleAllSubs(topic) {
  const leafIds = [];
  topic.subs.forEach(s => { leafIds.push(s.id); if (s.subs) s.subs.forEach(ss => leafIds.push(ss.id)); });
  const allDone = leafIds.every(id => isChecked(id));
  leafIds.forEach(id => { state[id] = !allDone; });
  saveState(); updateUI();
  showToast(allDone ? '↩ Unchecked topic' : '✓ Topic completed!');
}

function expandAll() {
  ROADMAP.forEach(p => p.topics.forEach(t => { state['open_'+t.id] = true; }));
  saveState();
  document.querySelectorAll('.subtasks').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.topic-toggle').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  ROADMAP.forEach(p => p.topics.forEach(t => { state['open_'+t.id] = false; }));
  saveState();
  document.querySelectorAll('.subtasks').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.topic-toggle').forEach(el => el.classList.remove('open'));
}

function resetAll() {
  if (!confirm('All progress will be reset. Are you sure?')) return;
  localStorage.removeItem('cse_roadmap_v4');
  state = {};
  render();
  showToast('↺ Progress reset');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

render();
</script>
